<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARLAJAYS Promise</title>
    <style>
        body { font-family: Arial, sans-serif; background: #1e293b; color: white; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #334155; padding: 30px; border-radius: 8px; }
        h1 { text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 10px; border: none; border-radius: 4px; font-family: Arial; box-sizing: border-box; }
        textarea { min-height: 100px; resize: vertical; }
        button { width: 100%; padding: 12px; background: #10b981; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 16px; }
        button:hover { background: #059669; }
        .message { padding: 10px; margin-bottom: 15px; border-radius: 4px; display: none; }
        .success { background: #dcfce7; color: #166534; border: 1px solid #86efac; }
        .error { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ARLAJAYS Promise - Get Your Free Quote</h1>
        <div id="success" class="message success">✓ Quote submitted! We'll contact you within 24 hours.</div>
        <div id="error" class="message error"></div>
        
        <form id="quoteForm" onsubmit="submitForm(event)">
            <div class="form-group">
                <label>Your Name</label>
                <input type="text" name="name" required>
            </div>
            
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" name="phone" required>
            </div>
            
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" required>
            </div>
            
            <div class="form-group">
                <label>ZIP Code</label>
                <input type="text" name="zip" required>
            </div>
            
            <div class="form-group">
                <label>Type of Work</label>
                <select name="service" required>
                    <option value="">Select a service...</option>
                    <option value="General Repairs">General Repairs</option>
                    <option value="Bathroom Work">Bathroom Work</option>
                    <option value="Kitchen Updates">Kitchen Updates</option>
                    <option value="Carpentry & Trim">Carpentry & Trim</option>
                    <option value="Electrical Basics">Electrical Basics</option>
                    <option value="Plumbing Fixes">Plumbing Fixes</option>
                    <option value="Flooring Prep">Flooring Prep</option>
                    <option value="Exterior Work">Exterior Work</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Describe Your Project</label>
                <textarea name="description" required></textarea>
            </div>
            
            <button type="submit">Get Free Quote</button>
        </form>
    </div>

    <script>
        const API_ENDPOINT = 'https://hooks.zapier.com/hooks/catch/YOUR_ZAPIER_WEBHOOK_ID/';

        async function submitForm(event) {
            event.preventDefault();
            
            const form = document.getElementById('quoteForm');
            const successMsg = document.getElementById('success');
            const errorMsg = document.getElementById('error');
            const button = form.querySelector('button');
            
            successMsg.style.display = 'none';
            errorMsg.style.display = 'none';
            
            const formData = new FormData(form);
            const data = {
                name: formData.get('name'),
                phone: formData.get('phone'),
                email: formData.get('email'),
                service: formData.get('service'),
                description: formData.get('description'),
                zip: formData.get('zip'),
                timestamp: new Date().toISOString()
            };
            
            button.disabled = true;
            button.textContent = 'Submitting...';
            
            try {
                const response = await fetch(API_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                successMsg.style.display = 'block';
                form.reset();
                button.textContent = 'Get Free Quote';
                button.disabled = false;
            } catch (error) {
                errorMsg.textContent = 'Error submitting form. Please call (844) 555-0123.';
                errorMsg.style.display = 'block';
                button.textContent = 'Get Free Quote';
                button.disabled = false;
            }
        }
    </script>
</body>
</html>
